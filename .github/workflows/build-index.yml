name: Build Index

on:
  push:
    branches: [main]
    paths:
      - repos.yaml
      - generate-index.go
      - go.mod
      - go.sum
      - .github/workflows/build-index.yml
      - site/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Generate site
        run: go run generate-index.go

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 96cf255fd94a923e0ab7f34688f03bd4
          command: pages deploy site --project-name repos-supermodeltools